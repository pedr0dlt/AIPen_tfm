version: '3.8'

networks:
  backend:
    # orchestrator <-> ollama <-> executor
  lab:
    # executor <-> target (metasploitable | vacaciones | ...)
    internal: true
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/24
          gateway: 172.28.0.1

services:
  ollama:
    image: ollama/ollama:latest
    container_name: tfm_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend
    restart: unless-stopped
    # Ordenador personal
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  executor:
    build:
      context: ./executor
      dockerfile: Dockerfile
    container_name: tfm_executor
    ports:
      - "8000:8000"
    environment:
      # Credenciales del msfrpcd
      - MSF_RPC_USER=msf
      - MSF_RPC_PASS=msf123
      - MSF_RPC_PORT=55553
    volumes:
      - ./data/reports:/reports
      - ./executor/playbooks:/playbooks
    networks:
      - backend
      - lab   
    restart: unless-stopped

  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    container_name: tfm_orchestrator
    depends_on:
      - ollama
      - executor
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - EXECUTOR_HOST=http://executor:8000
      - MSF_RPC_HOST=executor
      - MSF_RPC_PORT=55553
      - MSF_RPC_USER=msf
      - MSF_RPC_PASS=msf123
      # TARGET_IP se deriva automáticamente del perfil activo:
      #   COMPOSE_PROFILES=metasploitable -> TARGET_IP=metasploitable (DNS lab -> 172.28.0.10)
      #   COMPOSE_PROFILES=vacaciones     -> TARGET_IP=vacaciones     (DNS lab -> 172.28.0.11)
      #- TARGET_IP=${COMPOSE_PROFILES:-metasploitable}
      - TARGET_IP=${COMPOSE_PROFILES:-vacaciones}
    env_file:
      - .env
    volumes:
      - ./orchestrator:/app
      - ./data:/data         
      - ./data/logs:/logs
    networks:
      - backend   # Solo habla con ollama y executor, nunca con el objetivo directamente
    command: >
      sh -c "python -m src.rag.build_index --if-needed; tail -f /dev/null"
    restart: unless-stopped

  metasploitable:
    image: tleemcjr/metasploitable2:latest
    container_name: tfm_metasploitable
    hostname: metasploitable
    profiles: ["metasploitable"]
    networks:
      lab:
        ipv4_address: 172.28.0.10
    privileged: true
    tty: true
    restart: unless-stopped

  vacaciones:
    image: vacaciones                # cargada con scripts/load_vacaciones.sh (docker load -i)
    container_name: tfm_vacaciones
    hostname: vacaciones
    profiles: ["vacaciones"]
    networks:
      lab:
        ipv4_address: 172.28.0.11
    restart: unless-stopped

volumes:
  ollama_data:
