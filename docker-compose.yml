version: '3.8'

networks:
  backend:
    # orchestrator <-> ollama <-> executor
  lab:
    # executor <-> metasploitable
    internal: true

services:
  ollama:
    image: ollama/ollama:latest
    container_name: tfm_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - backend
    restart: unless-stopped
    # Ordenador personal
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  executor:
    build:
      context: ./executor
      dockerfile: Dockerfile
    container_name: tfm_executor
    ports:
      - "8000:8000"
    volumes:
      - ./data/reports:/reports
      - ./executor/playbooks:/playbooks
    networks:
      - backend   # Recibe órdenes del orchestrator
      - lab       # Lanza ataques contra metasploitable
    restart: unless-stopped

  metasploitable:
    image: tleemcjr/metasploitable2:latest
    container_name: tfm_metasploitable
    hostname: metasploitable
    networks:
      - lab
    privileged: true  
    tty: true         
    restart: unless-stopped

volumes:
  ollama_data:
